format = "${custom.weather}${custom.pyenv}${custom.sep_pyenv_git}$git_branch${custom.sep_git_dir}${custom.sep_to_dir}$directory$line_break$character"

[directory]
truncation_length = 0
truncate_to_repo = false
format = "[ $path ](bg:#85C79A fg:#281C59 bold)[](fg:#85C79A)"

[git_branch]
format = "[ $branch ](bg:#F38181 fg:#FFF8F0 bold)"

[custom.weather]
command = "cat /tmp/.starship_weather 2>/dev/null"
when = "test -s /tmp/.starship_weather"
format = "[ $output ](bg:#4E8D9C fg:#FFF8F0 bold)"
shell = ["bash", "--noprofile", "--norc"]

[custom.pyenv]
command = 'if [ -n "$CONDA_DEFAULT_ENV" ]; then echo "$CONDA_DEFAULT_ENV"; else basename "$VIRTUAL_ENV"; fi'
when = '[ -n "$CONDA_DEFAULT_ENV" ] || [ -n "$VIRTUAL_ENV" ]'
format = "[ $output ](bg:#FCE38A fg:#281C59 bold)"
shell = ["bash", "--noprofile", "--norc"]

[custom.sep_pyenv_git]
command = "echo -n"
when = "git rev-parse --git-dir 2>/dev/null"
format = ""
shell = ["bash", "--noprofile", "--norc"]

[custom.sep_git_dir]
command = "echo -n"
when = "git rev-parse --git-dir 2>/dev/null"
format = ""
shell = ["bash", "--noprofile", "--norc"]

[custom.sep_to_dir]
command = "echo -n"
when = "! git rev-parse --git-dir > /dev/null 2>&1"
format = ""
shell = ["bash", "--noprofile", "--norc"]

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
