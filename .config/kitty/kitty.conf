font_family      Maple Mono NF CN
font_size        20.0

# 外观
background_opacity 0.92
background_blur 20
cursor_shape     beam
cursor_blink_interval 0

# 主题（等价 catppuccin-mocha）
include catppuccin-mocha.conf

# 覆盖背景色为 Claude 官网深灰
background #1d2021
foreground #e8e0cc

# 行为
copy_on_select   yes
hide_mouse_when_typing yes

# 分屏（对应你原来的 ghostty keybind）
enabled_layouts splits
map cmd+d        launch --location=vsplit
map cmd+shift+d  launch --location=hsplit
map cmd+w        close_window
map cmd+shift+enter toggle_layout stack

# 窗口焦点切换
map cmd+h neighboring_window left
map cmd+l neighboring_window right
map cmd+k neighboring_window up
map cmd+j neighboring_window down

# 窗口位置互换
map cmd+shift+h move_window left
map cmd+shift+l move_window right
map cmd+shift+k move_window up
map cmd+shift+j move_window down
