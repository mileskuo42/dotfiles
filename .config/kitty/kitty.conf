font_family      Maple Mono NF CN
font_size        20.0

# 外观
background_opacity 0.92
background_blur 20
cursor_shape     beam
cursor_blink_interval 0

# 分割线
window_border_width  2px
active_border_color  #ffffff
inactive_border_color #313244

# 主题（等价 catppuccin-mocha）
include catppuccin-mocha.conf

# 覆盖背景色为 Claude 官网深灰
background #1d2021
foreground #e8e0cc

# 行为
copy_on_select   yes
hide_mouse_when_typing yes

# 分屏（对应你原来的 ghostty keybind）
enabled_layouts splits
map cmd+d        launch --location=vsplit
map cmd+shift+d  launch --location=hsplit
map cmd+w        close_window
map cmd+shift+enter toggle_layout stack

# 窗口互换
map ctrl+shift+left  move_window left
map ctrl+shift+right move_window right
map ctrl+shift+up    move_window up
map ctrl+shift+down  move_window down
